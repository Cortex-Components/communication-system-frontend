name: build and push
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # - name: Login to Docker registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: dhi.io
      #     username: ${{ secrets.docker_username }}
      #     password: ${{ secrets.docker_password }}

      - name: Build Docker Image
        run: |
          docker build -f Dockerfile.server -t ${{ secrets.docker_username }}/${{ secrets.docker_repo }}:${{ github.ref_name }} .
          docker build -f Dockerfile.server -t ${{ secrets.docker_username }}/${{ secrets.docker_repo }}:latest .

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_password }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.docker_username }}/${{ secrets.docker_repo }}:${{ github.ref_name }}
          docker push ${{ secrets.docker_username }}/${{ secrets.docker_repo }}:latest
