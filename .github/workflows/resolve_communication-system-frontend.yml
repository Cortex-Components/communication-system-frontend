name: Deploy Full Stack

on:
  push:
    branches: [resolve]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Build backend
        working-directory: ./server
        run: |
          npm install
          npm run build

      - name: Prepare backend artifact
        run: |
          mkdir deploy
          cp -r server/dist deploy/
          cp server/package.json deploy/
          cp src deploy/
          cp package.json deploy/



      - name: Upload backend
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: deploy

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend

      - name: Deploy backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: communication-system-frontend
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_2CDA1DA4D8104C7F90EE639DECBBD2B2 }}
          package: .
