name: Deploy Full Stack

on:
  push:
    branches: [resolve]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      # =========================
      # BUILD BACKEND ONLY
      # =========================
      - name: Build backend
        run: |
          cd server
          npm install --include=dev 
          npx tsc

      # =========================
      # PREPARE DEPLOY PACKAGE
      # =========================
      - name: Prepare deployment folder
        run: |
          mkdir deploy

          # backend compiled output ONLY
          cp -r server/dist deploy/server

          # frontend SOURCE (no build)
          cp -r src deploy/
          cp -r styles deploy/

          # root config
          cp package.json deploy/

      # =========================
      # UPLOAD
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: deploy
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app

      - name: Deploy backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: communication-system-frontend
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_2CDA1DA4D8104C7F90EE639DECBBD2B2 }}
          package: .
